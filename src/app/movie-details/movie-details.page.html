<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Movie Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <h3>Cast</h3>
  <ion-item *ngFor="let person of cast">
    {{ person.name }} - {{ person.character }}
  </ion-item>

  <h3>Crew</h3>
  <ion-item *ngFor="let person of crew">
    {{person.name }} - {{person.job}}
  </ion-item>

</ion-content>
