<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Movie Details</ion-title>

    <ion-buttons slot="end">
        <ion-button routerLink="/home">
          <ion-icon name="home" aria-label="Home"></ion-icon>
        </ion-button>
      
        <ion-button routerLink="/favourites">
          <ion-icon name="heart" aria-label="Favorite"></ion-icon>
        </ion-button>
      </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!--Button used to add or remove current movie from favourites.
  Button text and colour change depending on if the movie is already saved or not.-->
  <ion-button (click)="toggleFavourite()" [color]="isItFavourite ? 'danger' : 'primary'">
    {{ isItFavourite ? 'Remove From Favourites' : 'Add To Favourites' }}
  </ion-button>

  <ion-card *ngIf="movie">

    <ion-card-header>
      <ion-card-title>{{ movie.title }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      {{ movie.overview }}
    </ion-card-content>

  </ion-card>

  <ion-card>

    <ion-card-header>
      <ion-card-title>Cast</ion-card-title>
    </ion-card-header>

    <ion-list>

      <ion-item *ngFor="let person of cast" [routerLink]="['/person', person.id]">
        <img *ngIf="person.profile_path"[src]="'https://image.tmdb.org/t/p/w200' + person.profile_path" />
      
        <ion-label>
          {{ person.name }} - - {{ person.character }}
        </ion-label>
      </ion-item>

    </ion-list>
  </ion-card>
 
  
  <ion-card>
    <ion-card-header>
      <ion-card-title>Crew</ion-card-title>
    </ion-card-header>

    <ion-list>

      <ion-item *ngFor="let person of crew" [routerLink]="['/person', person.id]">
        <img *ngIf="person.profile_path" [src]="'https://image.tmdb.org/t/p/w200' + person.profile_path" />
        <ion-label>
          {{person.name }} - - {{person.job}}
        </ion-label>
      </ion-item>
    
    </ion-list>
  </ion-card>

</ion-content>
