<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      G00474276
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
<div>
 <ion-item>
    <ion-input [(ngModel)]="newSearch" label="Movie Search" placeholder="Enter Search Here"></ion-input>
  </ion-item>
<ion-button (click)="setKeyword()">Search</ion-button> 
</div>

<div>
<ion-card *ngFor="let movie of movies">

    <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" />

    <ion-card-header>
      <ion-card-title>
        {{ movie.title }}
      </ion-card-title>

      <ion-card-subtitle>
        {{ movie.release_date }}
      </ion-card-subtitle>
    </ion-card-header>

  </ion-card>
</div>
</ion-content>
